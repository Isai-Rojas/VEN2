<!DOCTYPE html>
<html>
<head>
  <title>Receipt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; text-align: center;">

<h1>🧾 Receipt</h1>

<div id="receipt"></div>


<style>
html, body {
  height: 100%;
  margin: 0;
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f4f4f4;
  font-family: Arial;
}

#receipt {
  width: 90vw;
  max-width: 600px;
  font-size: 4vw; /* scales with screen */
  text-align: center;
}
</style>



<script>
const params = new URLSearchParams(window.location.search);
let encoded = params.get("data");

let output = "";

if (encoded) {
  try {
    const data = JSON.parse(atob(encoded));

    output += `<strong>Items Purchased:</strong><br><br>`;

    if (!data.counts || Object.keys(data.counts).length === 0) {
      output += "No items purchased<br>";
    } else {
      for (let item in data.counts) {
        output += `${item}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;x${data.counts[item]}<br>`;
      }
    }

    output += `<br><strong>Total Items:</strong> ${data.totalItems}<br>`;
    output += `<strong>Remaining Balance (Change):</strong> $${data.balance}<br>`;
    output += `<strong>Total Amount Spent:</strong> $${data.spent}<br>`;

  } catch {
    output = "Invalid QR Code";
  }
}

document.getElementById("receipt").innerHTML = output;
</script>

</body>
</html>
