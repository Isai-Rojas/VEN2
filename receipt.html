<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Receipt Display</title>

<style>
body {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  background: #f4f4f4;
}

#text {
  font-size: 48px;
  font-family: Georgia, serif;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div id="text"></div>

<script>
const params = new URLSearchParams(window.location.search);
let encoded = params.get("data") || "";

// Decode Base64
let decoded = "";
try {
  decoded = atob(encoded);
} catch {
  decoded = "Invalid QR Code";
}

// Safety: only allow words
decoded = decoded.replace(/[^a-zA-Z ]/g, "");

document.getElementById("text").innerText = decoded;
</script>

</body>
</html>
