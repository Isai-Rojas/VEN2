<!DOCTYPE html>
<html lang="en">
<head>
    <title>Display Message</title>
</head>
<body>
    <h1>The Message Received:</h1>
    <p id="output" style="font-size: 24px; color: blue;">Waiting for message...</p>

    <script>
        // 1. Get the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        
        // 2. Look for the specific 'msg' parameter
        const receivedMessage = urlParams.get('msg');

        // 3. If a message exists, display it
        if (receivedMessage) {
            document.getElementById('output').innerText = receivedMessage;
        } else {
            document.getElementById('output').innerText = "No message found!";
        }
    </script>
</body>
</html>
