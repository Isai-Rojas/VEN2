<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cloudflare.com"></script>
  <meta charset="UTF-8">
  <title>Virtual Vending Machine</title>
  <style>
    body { font-family: Arial; text-align: center; }
    #machine { width: 300px; cursor: pointer; }
    #menu { display: none; }


    .item {
      cursor: pointer;
      margin: 10px;
      padding: 10px;
      border: 1px solid black;
      transition: background-color 0.3s;
    }


    .clicked {
      background-color: lightgreen;
    }


    #balanceBox {
      margin: 10px;
      font-size: 18px;
      font-weight: bold;
    }


    #output {
      margin-top: 10px;
      font-weight: bold;
    }


    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>


<h1>Virtual Vending Machine</h1>


<img id="machine" src="https://i.ibb.co/JRm3wK06/Vending-Machine-Image.png"  alt="vending machine" border="0">
<img src="https://www.google.com/search?q=can+javascript+be+used+in+html&oq=can+javascript+be+used+in+html&gs_lcrp=EgZjaHJvbWUyBggAEEUYOTIICAEQABgWGB4yDQgCEAAYhgMYgAQYigUyDQgDEAAYhgMYgAQYigUyDQgEEAAYhgMYgAQYigUyDQgFEAAYhgMYgAQYigUyCggGEAAYgAQYogQyCggHEAAYgAQYogTSAQkxMDU3MGoxajeoAgCwAgA&sourceid=chrome&ie=UTF-8" alt="QR Code" />



<div id="menu">


  <div id="balanceBox">Balance: $0.00</div>


  <button onclick="addMoney(5)">Insert $5</button>


  <h2>Select Item</h2>
  <div class="item" onclick="buyItem(this, 'Chips')">Chips - $1.50</div>
  <div class="item" onclick="buyItem(this, 'Soda')">Soda - $2.00</div>
  <div class="item" onclick="buyItem(this, 'Candy')">Candy - $1.25</div>


  <button onclick="finish()">Done</button>


  <div id="output"></div>
</div>

<h2>QR Code via JavaScript</h2>
<div id="qrcode"></div>

<script>
        // Initialize the QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR2Ut97xW_r1RL27V89tDw_MUOQulCzHJ9o1ddxp3Md3JnkPWally4gJUX8RS8KQN0OLmy5yDFM2j4jzn7Ow0Yp4ogxmEAvpsWhgf9X42IzewdQkSs&s=10&ec=121635956",
            width: 128,
            height: 128,
            colorDark : "#000000",
            colorLight : "#ffffff"
        });
class VendingMachine {
  constructor() {
    this.prices = { Chips: 1.50, Soda: 2.00, Candy: 1.25 };


    this.balance = 0;
    this.spent = 0.0;
    this.purchases = [];
  }


  addMoney(amount) {
    this.balance += amount;
    return this.balance;
  }


  buy(item) {
    const price = this.prices[item];


    if (this.balance < price) {
      return `⚠️ Not enough balance for ${item}`;
    }
   
    this.spent += price;
    this.balance -= price;
    this.purchases.push(item);


    return `✅ Bought ${item}`;
  }
}


const vm = new VendingMachine();


function updateBalance() {
  document.getElementById("balanceBox").innerText =
    `Balance: $${vm.balance.toFixed(2)}`;
}


// Open machine
document.getElementById('machine').onclick = () => {
  document.getElementById('menu').style.display = 'block';
  updateBalance();
};


function addMoney(amount) {
  vm.addMoney(amount);
  updateBalance();
}


function buyItem(element, item) {
  let result = vm.buy(item);
  if (result.startsWith("⚠️")) {
    element.style.backgroundColor = "red";


    setTimeout(() => {
    element.style.backgroundColor = "";
  }, 300);
}
  element.classList.add("clicked");
  setTimeout(() => element.classList.remove("clicked"), 200);


  document.getElementById("output").innerText = result;
  updateBalance();
}


function finish() {
  const receipt = {
    items: vm.purchases,
    balance: vm.balance.toFixed(2),
    totalItems: vm.purchases.length,
    spent: vm.spent.toFixed(2)
  };


  localStorage.setItem("receipt", JSON.stringify(receipt));


  window.location.href = "receipt.html";
}
</script>


</body>
</html>
