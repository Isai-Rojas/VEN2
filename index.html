<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cloudflare.com"></script>
    <meta charset="UTF-8">
    <title>Sender Page</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        input { padding: 10px; width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Enter a Message</h1>
    <input type="text" id="userInput" placeholder="Type something here...">
    <button onclick="transferMessage()">Send to Page 2</button>

    <div id="qrcode"></div>

    <script type="text/javascript">
  
        new QRCode(document.getElementById("qrcode"), ""display.html?msg=" + encodedMessage");

    </script>


    <script>
        function transferMessage() {
            const message = document.getElementById('userInput').value;
            // Encodes the message to ensure symbols like spaces or emojis work in a URL
            const encodedMessage = encodeURIComponent(message);
            // Redirects to display.html with the message in the URL
            window.location.href = "display.html?msg=" + encodedMessage;
        }
    </script>

</body>
</html>
