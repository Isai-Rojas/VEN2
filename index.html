<!DOCTYPE html>
<html lang="en">
<head>
    <title>Send Message</title>
</head>
<body>
    <h1>Type a Message</h1>
    <input type="text" id="messageInput" placeholder="Enter message here...">
    <button onclick="transferMessage()">Send to Page 2</button>

    <script>
        function transferMessage() {
            // Get the value from the input box
            const message = document.getElementById('messageInput').value;
            
            // Encode the message to ensure it works in a URL (handles spaces/symbols)
            const encodedMessage = encodeURIComponent(message);
            
            // Redirect to the second page with the message in the URL
            window.location.href = "display.html?msg=" + encodedMessage;
        }
    </script>
</body>
</html>
