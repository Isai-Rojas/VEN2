<!DOCTYPE html>
<html>
<head>
    <title>My GitHub Pages QR Code</title>
    <!-- 1. Include the Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <h1>Scan this to visit my page!</h1>
    
    <!-- 2. Create the Container -->
    <div id="qrcode"></div>

    <script type="text/javascript">
        // 3. Generate the Code
        // Replace the URL with your GitHub Pages link
        new QRCode(document.getElementById("qrcode"), "https://github.io");
    </script>

</body>
</html>
