<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="text-align:center; font-family:Arial; margin-top:50px;">

    <h2>Enter Words</h2>
    <input type="text" id="userInput" placeholder="Type words only" />
    <br><br>
    <button onclick="generateQR()">Generate QR Code</button>

    <h3>QR Code:</h3>
    <div id="qrcode"></div>

    <script>
        function generateQR() {
            let input = document.getElementById("userInput").value;

            // Allow only words (letters and spaces)
            let cleanInput = input.replace(/[^a-zA-Z ]/g, "");

            // Encode into URL
            let baseURL = "https://isai-rojas.github.io/VEN2/display.html";
            let url = baseURL + "?text=" + encodeURIComponent(cleanInput);

            // Clear previous QR
            document.getElementById("qrcode").innerHTML = "";

            // Generate QR
            new QRCode(document.getElementById("qrcode"), {
                text: url,
                width: 200,
                height: 200
            });
        }
    </script>

</body>
</html>
