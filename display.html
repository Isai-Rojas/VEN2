<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receiver Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        #output { font-size: 24px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

    <h1>The Message Received:</h1>
    <p id="output">No message found.</p>
    
    <a href="index.html">Go Back</a>

    <script>
        // 1. Get the URL parameters (everything after the ?)
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        
        // 2. Look for the "msg" parameter
        const message = urlParams.get('msg');

        // 3. If it exists, display it on the page
        if (message) {
            document.getElementById('output').innerText = message;
        }
    </script>

</body>
</html>
