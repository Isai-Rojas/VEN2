<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Receiver Page</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        #output { font-size: 24px; font-weight: bold; color: #28a745; }
    </style>
</head>
<body>

    <h1>The Message Received:</h1>
    <p id="output">No message found.</p>
    
    <a href="index.html">Go Back</a>

    <script>
        // Get the query string (e.g., ?msg=Hello)
        const urlParams = new URLSearchParams(window.location.search);
        const myMsg = urlParams.get('msg');
    
        // Display it in an element
        if (myMsg) {
            document.getElementById('displayElement').innerText = decodeURIComponent(myMsg);
            }

    </script>

</body>
</html>
